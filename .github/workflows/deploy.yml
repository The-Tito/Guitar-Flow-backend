name: Deploy Guitar Flow Backend

on:
  push:
    branches:
      - main # Despliegue automático en main
  workflow_dispatch: # También permite dispararlo manualmente

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: guitar-flow-backend
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ubuntu

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build y push de la imagen Docker a ECR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout — Guitar-Flow-Back (este repo)
        uses: actions/checkout@v4
        with:
          path: Guitar-Flow-Back

      - name: Checkout — Guitar-Flow-infra (repo hermano)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INFRA_REPO }} # ej: tu-org/Guitar-Flow-infra
          token: ${{ secrets.GH_PAT }} # PAT con acceso al repo de infra
          path: Guitar-Flow-infra

      # La estructura queda así en el runner:
      #   ./Guitar-Flow-Back/
      #   ./Guitar-Flow-infra/
      # Igual que en tu máquina local — el docker-compose del Back usa ../Guitar-Flow-infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          # Tag = sha corto del commit, ej: abc1234
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        working-directory: Guitar-Flow-Back
        run: |
          docker build \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            --file Dockerfile \
            .

      - name: Push image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Despliegue en EC2 (SSH)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push # Solo se ejecuta si el build fue exitoso

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e   # Abort si cualquier comando falla

            ECR_REGISTRY="${{ needs.build-and-push.outputs.ecr-registry }}"
            ECR_REPO="${{ env.ECR_REPOSITORY }}"
            IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
            AWS_REGION="${{ env.AWS_REGION }}"

            echo "▶ Autenticando en ECR..."
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            echo "▶ Bajando nueva imagen: $IMAGE_TAG"
            docker pull "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"

            echo "▶ Deteniendo contenedor anterior (si existe)..."
            docker stop guitar-flow-backend 2>/dev/null || true
            docker rm   guitar-flow-backend 2>/dev/null || true

            echo "▶ Iniciando nuevo contenedor..."
            docker run -d \
              --name guitar-flow-backend \
              --restart unless-stopped \
              --env-file /home/ubuntu/guitar-flow/.env \
              -p 3000:3000 \
              "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"

            echo "▶ Verificando health check..."
            sleep 5
            curl --fail http://localhost:3000/health \
              && echo "✅ Despliegue exitoso: $IMAGE_TAG" \
              || (echo "❌ Health check fallido" && exit 1)

            echo "▶ Limpiando imágenes antiguas..."
            docker image prune -f
